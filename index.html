<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <!-- Makes the game responsive on phones and tablets -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Flappy Bird</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      overflow: hidden;
    }

    body {
      background: #70c5ce;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100dvh;
      padding: 12px;
      font-family: Arial, sans-serif;

      /* Stops accidental scrolling while playing on mobile */
      touch-action: manipulation;
    }

    .game-container {
      width: min(100%, 420px);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    canvas {
      display: block;

      /*
        Canvas keeps its internal 320 × 480 game size,
        but visually scales according to the device.
      */
      width: auto;
      height: auto;
      max-width: 100%;
      max-height: calc(100dvh - 90px);
      aspect-ratio: 2 / 3;

      border: 2px solid #000;
      background-color: #70c5ce;
      border-radius: 8px;

      /* Prevents mobile browser gestures inside the canvas */
      touch-action: none;
    }

    button {
      margin-top: 12px;
      padding: 10px 24px;
      min-width: 130px;
      font-size: 16px;
      font-weight: bold;
      border: none;
      background: #4caf50;
      color: white;
      border-radius: 6px;
      cursor: pointer;
      display: none;
    }

    button:hover {
      background: #3d9141;
    }

    button:active {
      transform: scale(0.97);
    }

    .instructions {
      margin: 8px 0 0;
      font-size: 14px;
      text-align: center;
      color: #1f1f1f;
    }

    @media screen and (max-width: 480px) {
      body {
        padding: 8px;
      }

      button {
        width: 100%;
        max-width: 320px;
        padding: 12px;
      }

      .instructions {
        font-size: 13px;
      }
    }
  </style>
</head>

<body>

  <main class="game-container">
    <!-- Keep these internal dimensions for game calculations -->
    <canvas id="game" width="320" height="480"></canvas>

    <button id="restart" type="button">Restart</button>

    <p class="instructions">
      Press Space or tap the game to flap
    </p>
  </main>

  <!-- preload helps load sounds before they are played -->
  <audio
    id="flap"
    src="boom.mp3"
    preload="auto">
  </audio>

  <audio
    id="hit"
    src="Game Over 7.mp3"
    preload="auto">
  </audio>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const restartBtn = document.getElementById("restart");
    const flapSound = document.getElementById("flap");
    const hitSound = document.getElementById("hit");

    const birdImg = new Image();
    birdImg.src = "flappy-bird.png";

    const gravity = 0.05;
    const jumpPower = -2;
    const pipeGap = 120;
    const pipeWidth = 40;
    const pipeSpeed = 2;

    let bird;
    let pipes;
    let score;
    let gameOver;
    let animationId;

    function resetGame() {
      /*
        Cancel the previous animation before starting another.
        This prevents multiple game loops after pressing Restart.
      */
      cancelAnimationFrame(animationId);

      bird = {
        x: 50,
        y: 150,
        width: 34,
        height: 24,
        velocity: 0
      };

      pipes = [];
      score = 0;
      gameOver = false;

      restartBtn.style.display = "none";

      gameLoop();
    }

    function playSound(sound) {
      /*
        Reset the audio so it can play repeatedly,
        even when the user taps quickly.
      */
      sound.currentTime = 0;

      sound.play().catch(() => {
        // Some browsers may block sound until user interaction.
      });
    }

    function jump() {
      if (gameOver) {
        return;
      }

      bird.velocity = jumpPower;
      playSound(flapSound);
    }

    function handleKeyDown(event) {
      if (event.code === "Space") {
        event.preventDefault();
        jump();
      }
    }

    function handlePointerDown(event) {
      event.preventDefault();
      jump();
    }

    document.addEventListener("keydown", handleKeyDown);

    /*
      pointerdown works with mouse, touchscreen,
      stylus and other pointing devices.
    */
    canvas.addEventListener("pointerdown", handlePointerDown);

    restartBtn.addEventListener("click", resetGame);

    function createPipe() {
      const minimumTopHeight = 50;
      const maximumTopHeight =
        canvas.height - pipeGap - minimumTopHeight;

      const topHeight =
        Math.random() *
        (maximumTopHeight - minimumTopHeight) +
        minimumTopHeight;

      pipes.push({
        x: canvas.width,
        top: topHeight,
        passed: false
      });
    }

    function update() {
      bird.velocity += gravity;
      bird.y += bird.velocity;

      const birdTouchesFloor =
        bird.y + bird.height >= canvas.height;

      const birdTouchesCeiling = bird.y <= 0;

      if (birdTouchesFloor || birdTouchesCeiling) {
        endGame();
        return;
      }

      if (
        pipes.length === 0 ||
        pipes[pipes.length - 1].x < 180
      ) {
        createPipe();
      }

      pipes.forEach(pipe => {
        pipe.x -= pipeSpeed;

        const birdRight = bird.x + bird.width;
        const birdBottom = bird.y + bird.height;
        const pipeRight = pipe.x + pipeWidth;
        const bottomPipeStart = pipe.top + pipeGap;

        const horizontallyColliding =
          birdRight > pipe.x && bird.x < pipeRight;

        const verticallyColliding =
          bird.y < pipe.top || birdBottom > bottomPipeStart;

        if (horizontallyColliding && verticallyColliding) {
          endGame();
        }

        if (!pipe.passed && pipeRight < bird.x) {
          score++;
          pipe.passed = true;
        }
      });

      pipes = pipes.filter(pipe => pipe.x > -pipeWidth);
    }

    function drawBackground() {
      const gradient = ctx.createLinearGradient(
        0,
        0,
        0,
        canvas.height
      );

      gradient.addColorStop(0, "#70c5ce");
      gradient.addColorStop(1, "#d4f1f4");

      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function drawBird() {
      /*
        Draw the image when it is available.
        Otherwise draw a yellow rectangle as fallback.
      */
      if (birdImg.complete && birdImg.naturalWidth > 0) {
        ctx.drawImage(
          birdImg,
          bird.x,
          bird.y,
          bird.width,
          bird.height
        );
      } else {
        ctx.fillStyle = "#ffd700";
        ctx.fillRect(
          bird.x,
          bird.y,
          bird.width,
          bird.height
        );
      }
    }

    function drawPipes() {
      pipes.forEach(pipe => {
        ctx.fillStyle = "#2e9b35";

        ctx.fillRect(
          pipe.x,
          0,
          pipeWidth,
          pipe.top
        );

        ctx.fillRect(
          pipe.x,
          pipe.top + pipeGap,
          pipeWidth,
          canvas.height - pipe.top - pipeGap
        );

        ctx.strokeStyle = "#155d1b";
        ctx.lineWidth = 2;

        ctx.strokeRect(
          pipe.x,
          0,
          pipeWidth,
          pipe.top
        );

        ctx.strokeRect(
          pipe.x,
          pipe.top + pipeGap,
          pipeWidth,
          canvas.height - pipe.top - pipeGap
        );
      });
    }

    function drawScore() {
      ctx.fillStyle = "#ffffff";
      ctx.strokeStyle = "#000000";
      ctx.lineWidth = 3;
      ctx.font = "bold 24px Arial";
      ctx.textAlign = "center";

      ctx.strokeText(score, canvas.width / 2, 40);
      ctx.fillText(score, canvas.width / 2, 40);
    }

    function drawGameOver() {
      ctx.fillStyle = "rgba(0, 0, 0, 0.55)";
      ctx.fillRect(35, 180, 250, 120);

      ctx.fillStyle = "#ffffff";
      ctx.textAlign = "center";

      ctx.font = "bold 28px Arial";
      ctx.fillText(
        "Game Over",
        canvas.width / 2,
        225
      );

      ctx.font = "18px Arial";
      ctx.fillText(
        "Score: " + score,
        canvas.width / 2,
        265
      );
    }

    function draw() {
      drawBackground();
      drawPipes();
      drawBird();
      drawScore();

      if (gameOver) {
        drawGameOver();
      }
    }

    function endGame() {
      if (gameOver) {
        return;
      }

      gameOver = true;
      playSound(hitSound);
      restartBtn.style.display = "block";
    }

    function gameLoop() {
      if (!gameOver) {
        update();
        draw();

        animationId = requestAnimationFrame(gameLoop);
      } else {
        draw();
      }
    }

    resetGame();
  </script>

</body>
</html>
